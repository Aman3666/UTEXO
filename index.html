<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

/* ================= SOUND ENGINE ================= */

let audioCtx=null;

function unlockAudio(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
}

canvas.addEventListener("mousedown",unlockAudio);
canvas.addEventListener("touchstart",unlockAudio);
document.addEventListener("keydown",unlockAudio);

function sound(freq=440,time=0.08,type="square",vol=0.2){
  if(!audioCtx) return;

  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();

  osc.type=type;
  osc.frequency.value=freq;

  gain.gain.value=vol;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime+time
  );

  osc.stop(audioCtx.currentTime+time);
}
